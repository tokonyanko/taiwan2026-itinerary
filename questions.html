<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>質問リスト|台湾施設訪問 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#156082; --teal-deep:#0E4560; --sky:#00B0F0;
    --paper:#F6F9FB; --ink:#1C2B33; --en:#1F5C8B;
    --red:#C00000; --card:#FFFFFF; --line:#DCE8EF;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:"BIZ UDPGothic","Hiragino Sans",sans-serif;
    background:var(--paper); color:var(--ink);
    padding-bottom:60px;
  }
  header{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(135deg,var(--teal-deep),var(--teal));
    color:#fff; padding:14px 16px 10px;
    padding-top:calc(14px + env(safe-area-inset-top));
  }
  header h1{font-size:17px; letter-spacing:.02em}
  header .sub{font-size:11.5px; color:#BFE3F2; margin-top:2px}
  .toolbar{display:flex; gap:8px; align-items:center; margin-top:10px}
  .rate{display:flex; border:1px solid rgba(255,255,255,.5); border-radius:99px; overflow:hidden}
  .rate button{
    background:transparent; border:none; color:#DCEFF8;
    font-family:inherit; font-size:12px; padding:5px 12px; cursor:pointer;
  }
  .rate button.on{background:#fff; color:var(--teal); font-weight:700}
  #starOnly{
    background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.5);
    color:#fff; border-radius:99px; font-family:inherit; font-size:12px; padding:5px 12px; cursor:pointer;
  }
  #starOnly.on{background:#fff; color:var(--red); font-weight:700}
  #stopBtn{
    margin-left:auto; background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.5);
    color:#fff; border-radius:99px; font-family:inherit; font-size:12px; padding:5px 14px; cursor:pointer;
  }
  nav{
    position:sticky; top:0; z-index:19;
    display:flex; gap:8px; overflow-x:auto; padding:10px 16px;
    background:var(--paper); border-bottom:1px solid var(--line);
    scrollbar-width:none;
  }
  nav::-webkit-scrollbar{display:none}
  nav a{
    flex:0 0 auto; text-decoration:none; font-size:12.5px; font-weight:700;
    color:var(--teal); background:#fff; border:1.5px solid var(--teal);
    border-radius:99px; padding:6px 14px;
  }
  main{max-width:680px; margin:0 auto; padding:4px 14px}
  .sec{margin-top:22px}
  .sec-head{
    background:var(--teal); color:#fff; border-radius:10px;
    padding:10px 14px; margin-bottom:10px;
  }
  .sec-head b{font-size:15px}
  .sec-head span{display:block; font-size:11.5px; color:#BFE3F2; margin-top:2px}
  .grp{
    font-size:12.5px; font-weight:700; color:var(--teal);
    border-bottom:2px solid var(--sky);
    padding:2px 2px 4px; margin:16px 2px 10px;
  }
  .grp small{font-weight:400; color:var(--en); margin-left:6px}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px 14px 12px; margin-bottom:12px;
    box-shadow:0 1px 3px rgba(21,96,130,.06);
    transition:box-shadow .2s, border-color .2s;
  }
  .card.playing{border-color:var(--sky); box-shadow:0 0 0 3px rgba(0,176,240,.18)}
  .jp{font-size:14.5px; line-height:1.65}
  .jp .star{color:var(--red); font-weight:700}
  .en{font-size:12.5px; line-height:1.55; color:var(--en); margin-top:7px}
  .zh-row{
    display:flex; align-items:center; gap:12px;
    margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);
  }
  .zh{
    flex:1; font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    font-size:16px; font-weight:500; line-height:1.6; color:var(--teal-deep);
  }
  .say{
    flex:0 0 auto; width:46px; height:46px; border-radius:50%;
    border:none; cursor:pointer; color:#fff; background:var(--teal);
    display:grid; place-items:center;
    box-shadow:0 2px 6px rgba(21,96,130,.35);
  }
  .say:active{transform:scale(.94)}
  .say svg{width:22px; height:22px; fill:#fff}
  .card.playing .say{background:var(--sky)}
  body.staronly .card:not(.pri){display:none}
  body.staronly .grp.nopri{display:none}
  .tips{
    margin-top:26px; background:#EAF3F8; border-radius:12px;
    padding:14px; font-size:12px; line-height:1.7; color:#3A5A6B;
  }
  .tips b{color:var(--teal)}
  #voiceNote{display:none; margin:10px auto 0; max-width:680px;
    background:#FDF3E7; border:1px solid #F0D9B8; border-radius:10px;
    padding:10px 14px; font-size:12px; line-height:1.7; color:#7A5A2E}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important} }
</style>
</head>
<body>

<header>
  <h1>質問リスト|台湾施設訪問</h1>
  <div class="sub">2026.7.14-15|スピーカーで中文読み上げ</div>
  <div class="toolbar">
    <div class="rate" role="group" aria-label="読み上げ速度">
      <button id="rSlow">ゆっくり</button>
      <button id="rNorm" class="on">ふつう</button>
    </div>
    <button id="starOnly">★のみ</button>
    <button id="stopBtn">■ 停止</button>
  </div>
</header>

<div id="voiceNote">
  この端末に中国語の音声が見つかりません。iPhoneの場合: 設定 → アクセシビリティ → 読み上げコンテンツ → 声 → 中国語 から「Meijia(台湾)」等を追加してください。
</div>

    const hasPri = g.items.some(q => q.pri);

// ===== 音声 =====
let zhVoice = null, rate = 1.0, currentCard = null;

function pickVoice(){
  const vs = speechSynthesis.getVoices();
  zhVoice =
    vs.find(v => v.lang === "zh-TW") ||
    vs.find(v => /zh[-_]TW/i.test(v.lang)) ||
    vs.find(v => /^zh/i.test(v.lang)) || null;
  document.getElementById("voiceNote").style.display =
    (vs.length && !zhVoice) ? "block" : "none";
}
pickVoice();
if (typeof speechSynthesis !== "undefined")
  speechSynthesis.onvoiceschanged = pickVoice;

function clearPlaying(){
  if (currentCard) currentCard.classList.remove("playing");
  currentCard = null;
}

function speak(text, card){
  if (!("speechSynthesis" in window)) { alert("この端末は読み上げに対応していません"); return; }
  if (currentCard === card && speechSynthesis.speaking){
    speechSynthesis.cancel(); clearPlaying(); return;
  }
  speechSynthesis.cancel(); clearPlaying();
  pickVoice();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "zh-TW";
  if (zhVoice) u.voice = zhVoice;
  u.rate = rate;
  u.onend = clearPlaying;
  u.onerror = clearPlaying;
  currentCard = card;
  card.classList.add("playing");
  speechSynthesis.speak(u);
}

document.getElementById("stopBtn").addEventListener("click", () => {
  speechSynthesis.cancel(); clearPlaying();
});
const rS = document.getElementById("rSlow"), rN = document.getElementById("rNorm");
rS.addEventListener("click", () => { rate = 0.75; rS.classList.add("on"); rN.classList.remove("on"); });
rN.addEventListener("click", () => { rate = 1.0;  rN.classList.add("on"); rS.classList.remove("on"); });

document.getElementById("starOnly").addEventListener("click", (e) => {
  document.body.classList.toggle("staronly");
  e.target.classList.toggle("on");
});
